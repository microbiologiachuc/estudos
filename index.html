<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Portefólio · João Frade</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <h1>Portefólio</h1>
    <p class="subtitle">Procure por tema, especialidade ou palavra‑chave</p>

    <div class="search-row">
      <input id="searchInput" type="search" placeholder="Pesquisar..." aria-label="Pesquisar" />
      <div id="tagsContainer" class="tags"></div>
    </div>
  </header>

  <main>
    <section id="results" class="grid"></section>
  </main>

  <!-- Overlay de detalhe -->
  <dialog id="detailDialog">
    <article class="detail">
      <button id="closeDialog" aria-label="Fechar" class="close">×</button>
      <h2 id="detailTitle"></h2>
      <p id="detailSummary" class="muted"></p>
      <div id="detailContent" class="content"></div>
    </article>
  </dialog>

  <footer class="site-footer">
    <small>© <span id="year"></span> João Frade · Todos os direitos reservados</small>
  </footer>

  <script src="app.js" defer></script>
</body>
</html>
