<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Portefólio · João Frade</title>
  <link rel="stylesheet" href="styles.css" />
  <meta name="description" content="Portefólio com pesquisa e filtros" />
</head>
<body>
  <header class="site-header">
    <h1>Estudos microbiológicos disponíveis</h1>
    <p class="subtitle">Procure por tema, especialidade ou palavra‑chave</p>

    <div class="search-row">
      <input id="searchInput" type="search" placeholder="Pesquisar..." aria-label="Pesquisar" />
      <div id="tagsContainer" class="tags"></div>
    </div>

    <!-- Barra A–Z (necessária para o comportamento tipo SNS24) -->
    <nav id="alphaNav" class="alpha-nav" aria-label="Índice alfabético">
      <!-- botões gerados em app.js -->
    </nav>
  </header>

  <main>
    <!-- O JS vai injetar secções por letra no interior desta área -->
    <section id="results" class="grid" aria-live="polite"></section>
  </main>

  <!-- Modal de detalhe (conteúdo completo após clique) -->
  <dialog id="detailDialog" aria-labelledby="detailTitle">
    <article class="detail">
      <button id="closeDialog" aria-label="Fechar" class="close">×</button>
      <h2 id="detailTitle"></h2>
      <p id="detailSummary" class="muted"></p>
      <div id="detailContent" class="content"></div>
    </article>
  </dialog>

  <footer class="site-footer">
    <small>© <span id="year"></span> Laboratório de Microbiologia </small>
  </footer>

  <script src="app.js"></script>
</body>
</html>
